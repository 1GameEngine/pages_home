<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@1game/engine Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; font-family: system-ui, -apple-system, sans-serif; }
    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }
    #game-container {
      flex: 1; position: relative; cursor: pointer;
    }
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      pointer-events: none;
      z-index: 10;
    }
    #controls > * { pointer-events: auto; }
    .btn {
      padding: 10px 32px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 15px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      user-select: none;
    }
    .btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
    .btn:active { transform: scale(0.96); }
    #timeline-panel {
      display: none;
      width: 100%; max-width: 480px;
      flex-direction: column; align-items: center; gap: 8px;
    }
    #timeline-panel.visible { display: flex; }
    #timeline-label {
      font-size: 13px; color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
    }
    #timeline-slider {
      width: 100%; height: 6px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 3px; outline: none;
      cursor: pointer;
    }
    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #7c6aef;
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(124,106,239,0.5);
      cursor: grab;
    }
    #timeline-slider::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #7c6aef;
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(124,106,239,0.5);
      cursor: grab;
    }
  </style>
  <script type="module" crossorigin src="./assets/engine-demo-DdS_9s25.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/render-scene-canvas-D-QTtzso.js">
  <link rel="modulepreload" crossorigin href="./assets/renderGame-CpBzVqyB.js">
</head>
<body>
  <div id="app">
    <div id="game-container"></div>
    <div id="controls">
      <div id="timeline-panel">
        <input id="timeline-slider" type="range" min="0" max="0" value="0" step="1" />
        <div id="timeline-label">0s / 0s</div>
      </div>
      <button id="pause-btn" class="btn">暂停</button>
    </div>
  </div>
</body>
</html>
